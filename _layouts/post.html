---
layout: default
---

<article class="post-page">
  <header class="post-page__header">
    <a href="{{ '/archive' | relative_url }}" class="post-page__back">
      ← All newsletters
    </a>
    <h1 class="post-page__title">{{ page.title }}</h1>
    <time class="post-page__date" datetime="{{ page.date | date_to_xmlschema }}">
      {{ page.date | date: "%B %Y" }}
    </time>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
