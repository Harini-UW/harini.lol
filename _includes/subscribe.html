<section class="subscribe-section">
  <p class="subscribe-section__label">Stay in the loop</p>
  <form
    class="subscribe-form"
    id="subscribe-form"
    action="https://script.google.com/macros/s/AKfycby6bMUj6x4EvLAq1U-oEeRRNaxvvAV5Eguiw1lhEsEvFGzQVEOhfcLc9eKQGlP1hNMV8w/exec"
    method="POST"
    target="subscribe-iframe"
  >
    <div class="subscribe-form__row">
      <label for="bd-email" class="sr-only">Enter your email</label>
      <input type="email" name="email" id="bd-email" class="subscribe-form__input" placeholder="your@email.com" required />
      <button type="submit" class="subscribe-form__btn">Subscribe</button>
    </div>
    <p class="subscribe-form__status" id="subscribe-status" aria-live="polite"></p>
    <p class="subscribe-form__credit">No spam, unsubscribe anytime.</p>
  </form>
  <iframe name="subscribe-iframe" style="display:none"></iframe>
</section>

<script>
(function () {
  var form = document.getElementById('subscribe-form');
  var status = document.getElementById('subscribe-status');
  var iframe = document.querySelector('iframe[name="subscribe-iframe"]');
  if (!form || !iframe) return;

  form.addEventListener('submit', function () {
    var btn = form.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Subscribing…';
    status.textContent = '';

    iframe.onload = function () {
      status.textContent = 'You\'re in!';
      status.style.color = 'var(--color-accent)';
      form.reset();
      btn.disabled = false;
      btn.textContent = 'Subscribe';
    };
  });
})();
</script>
